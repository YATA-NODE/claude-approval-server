<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="承認パネル" id="meta-app-title" />
    <title id="tab-title">エージェント承認パネル</title>
    <style>
      :root {
        --bg: #f2f2f7;
        --card-bg: #ffffff;
        --text-primary: #1c1c1e;
        --text-secondary: #8e8e93;
        --input-bg: #ffffff;
        --input-border: #d1d1d6;
        --shadow: rgba(0, 0, 0, 0.08);
        --badge-online-bg: #d1f0d8;
        --badge-online-text: #1a7f37;
        --req-card-border: #ff9f0a;
        --req-card-selected-border: #007aff;
        --req-card-selected-shadow: rgba(0, 122, 255, 0.18);
        --hist-opacity: 0.75;
      }
      [data-theme='dark'] {
        --bg: #1c1c1e;
        --card-bg: #2c2c2e;
        --text-primary: #f2f2f7;
        --text-secondary: #8e8e93;
        --input-bg: #3a3a3c;
        --input-border: #48484a;
        --shadow: rgba(0, 0, 0, 0.3);
        --badge-online-bg: #1a3d25;
        --badge-online-text: #30d158;
        --req-card-border: #ff9f0a;
        --req-card-selected-border: #0a84ff;
        --req-card-selected-shadow: rgba(10, 132, 255, 0.25);
        --hist-opacity: 0.6;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        min-height: 100vh;
        transition: background 0.2s, color 0.2s;
      }
      .wrap {
        max-width: 480px;
        margin: 0 auto;
        padding: 16px;
      }

      /* ヘッダー行（タイトル + トグルボタン群） */
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 4px;
        padding-top: 8px;
      }
      .page-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-primary);
      }
      .header-toggles {
        display: flex;
        gap: 6px;
        margin-top: 2px;
      }
      .btn-toggle {
        padding: 4px 10px;
        border-radius: 20px;
        border: 1px solid var(--input-border);
        background: var(--card-bg);
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .btn-toggle:active {
        opacity: 0.7;
      }

      .page-sub {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 20px;
      }

      /* カード */
      .card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 14px;
        box-shadow: 0 1px 3px var(--shadow);
      }
      .card-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 14px;
      }
      label {
        font-size: 13px;
        color: var(--text-secondary);
        display: block;
        margin-bottom: 4px;
      }
      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--input-border);
        font-size: 14px;
        margin-bottom: 10px;
        background: var(--input-bg);
        color: var(--text-primary);
        outline: none;
        transition: border-color 0.15s, background 0.2s;
      }
      input:focus {
        border-color: #007aff;
      }
      [data-theme='dark'] input:focus {
        border-color: #0a84ff;
      }
      .btn-primary {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        background: #007aff;
        color: #fff;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-primary:active {
        background: #0062cc;
      }
      [data-theme='dark'] .btn-primary {
        background: #0a84ff;
      }

      /* 接続後ヘッダー行 */
      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .badge-online {
        display: inline-block;
        background: var(--badge-online-bg);
        color: var(--badge-online-text);
        border-radius: 20px;
        padding: 3px 10px;
        font-size: 12px;
        font-weight: 600;
      }
      .btn-disconnect {
        background: none;
        border: none;
        color: #ff3b30;
        font-size: 13px;
        cursor: pointer;
      }
      [data-theme='dark'] .btn-disconnect {
        color: #ff453a;
      }

      /* 一括承認ボタン */
      .btn-bulk {
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        background: #34c759;
        color: #fff;
        border: none;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 8px;
      }
      .btn-bulk:active {
        background: #28a745;
      }
      .btn-bulk:disabled {
        background: var(--text-secondary);
        cursor: default;
      }
      [data-theme='dark'] .btn-bulk {
        background: #30d158;
      }
      [data-theme='dark'] .btn-bulk:active {
        background: #25a244;
      }
      [data-theme='dark'] .btn-bulk:disabled {
        background: #3a3a3c;
        color: rgba(235, 235, 245, 0.3);
      }

      /* 取得ボタン */
      .btn-fetch {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        background: #007aff;
        color: #fff;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 16px;
      }
      .btn-fetch:active {
        background: #0062cc;
      }
      .btn-fetch:disabled {
        background: var(--text-secondary);
      }
      [data-theme='dark'] .btn-fetch {
        background: #0a84ff;
      }
      .last-fetch {
        font-size: 12px;
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 12px;
      }
      .err {
        color: #ff3b30;
        font-size: 13px;
        margin-top: 8px;
      }
      [data-theme='dark'] .err {
        color: #ff453a;
      }

      /* 正常系の一時通知トースト(エラーの赤と区別、画面下中央に出て自動で消える) */
      .toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%) translateY(8px);
        max-width: 90%;
        background: var(--badge-online-bg);
        color: var(--badge-online-text);
        padding: 10px 16px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
        box-shadow: 0 2px 10px var(--shadow);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s, transform 0.25s;
        z-index: 1000;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* セクションラベル */
      .section-label {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 10px;
      }
      .badge-cnt {
        display: inline-block;
        background: #ff3b30;
        color: #fff;
        border-radius: 20px;
        padding: 1px 8px;
        font-size: 12px;
        margin-left: 6px;
      }
      [data-theme='dark'] .badge-cnt {
        background: #ff453a;
      }

      /* 依頼カード */
      .req-card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 10px;
        border-left: 4px solid var(--req-card-border);
        box-shadow: 0 1px 3px var(--shadow);
        cursor: pointer;
        user-select: none;
        transition: box-shadow 0.15s;
      }
      .req-card.selected {
        border-left-color: var(--req-card-selected-border);
        box-shadow: 0 2px 8px var(--req-card-selected-shadow);
      }
      /* 複合質問カード(タブ式) */
      .req-card.multi-card {
        border-left-color: #ff9500;
        cursor: default;
      }
      [data-theme='dark'] .req-card.multi-card {
        border-left-color: #ff9f0a;
      }
      .multi-badge {
        display: inline-block;
        background: #ff9500;
        color: #fff;
        border-radius: 8px;
        padding: 1px 8px;
        font-size: 11px;
        font-weight: 600;
        margin-left: 6px;
        vertical-align: middle;
      }
      [data-theme='dark'] .multi-badge {
        background: #ff9f0a;
      }
      .sub-question {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid var(--req-card-border);
      }
      .sub-question:first-of-type {
        border-top: none;
        padding-top: 0;
      }
      .sub-label {
        font-size: 11px;
        color: var(--text-secondary);
        font-weight: 600;
        margin-bottom: 4px;
      }
      .sub-prompt {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.5;
        margin-bottom: 8px;
        word-break: break-word;
      }
      .btn-option.selected {
        outline: 3px solid #ffd60a;
        outline-offset: -3px;
      }
      .multi-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      .btn-submit-all {
        flex: 1 1 auto;
        padding: 14px;
        border-radius: 10px;
        border: none;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        background: #ff9500;
        color: #fff;
      }
      [data-theme='dark'] .btn-submit-all {
        background: #ff9f0a;
      }
      .btn-submit-all:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-submit-all:not(:disabled):active {
        opacity: 0.85;
      }
      /* v1.12.0: ダイアログ全体を Esc 相当で破棄するキャンセルボタン。
         multi では「すべて送信」の横、single ではボタン群の末尾に並ぶ。 */
      .btn-cancel-dialog {
        flex: 0 0 auto;
        padding: 14px 18px;
        border-radius: 10px;
        border: 1px solid var(--border, #ccc);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        background: transparent;
        color: var(--text-secondary, #666);
      }
      .btn-cancel-dialog:active {
        opacity: 0.7;
      }
      [data-theme='dark'] .btn-cancel-dialog {
        border-color: #444;
        color: #aaa;
      }
      /* single カードでは btn-area 内に単独で並ぶので margin で離す */
      .btn-area .btn-cancel-dialog {
        margin-top: 8px;
      }
      .req-card:active {
        opacity: 0.85;
      }
      .req-time {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 4px;
      }
      .req-desc {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.5;
        word-break: break-all;
      }
      .req-desc-short {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* アクションボタンエリア */
      .btn-area {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .btn-option {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
        line-height: 1.4;
        text-align: center;
        max-height: 12em;
        overflow: auto;
      }
      /* 長文選択肢(AskUserQuestion 等)は左寄せの方が読みやすい */
      .btn-option.btn-long {
        text-align: left;
      }
      .btn-option:active {
        opacity: 0.7;
      }
      .btn-option:disabled {
        opacity: 0.4;
      }
      .btn-yes {
        background: #34c759;
        color: #fff;
      }
      .btn-no {
        background: #ff3b30;
        color: #fff;
      }
      .btn-other {
        background: #007aff;
        color: #fff;
      }
      [data-theme='dark'] .btn-yes {
        background: #30d158;
      }
      [data-theme='dark'] .btn-no {
        background: #ff453a;
      }
      [data-theme='dark'] .btn-other {
        background: #0a84ff;
      }

      /* 空状態 */
      .empty {
        text-align: center;
        color: var(--text-secondary);
        font-size: 14px;
        padding: 2rem 0;
        line-height: 1.8;
      }

      /* 履歴 */
      .hist-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }
      .hist-head .section-label {
        margin: 0;
      }
      .btn-hist-clear {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--text-secondary);
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
        opacity: 0.85;
      }
      .btn-hist-clear:hover {
        opacity: 1;
      }
      .hist-card {
        background: var(--card-bg);
        border-radius: 10px;
        padding: 10px 14px;
        margin-bottom: 8px;
        opacity: var(--hist-opacity);
        position: relative;
      }
      .hist-card .btn-hist-del {
        position: absolute;
        top: 6px;
        right: 6px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 18px;
        line-height: 1;
        padding: 4px 8px;
        cursor: pointer;
        border-radius: 6px;
      }
      .hist-card .btn-hist-del:hover {
        background: rgba(0, 0, 0, 0.06);
      }
      [data-theme='dark'] .hist-card .btn-hist-del:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .hist-card .hist-label {
        padding-right: 28px;
      }
      .hist-label {
        font-size: 13px;
        font-weight: 600;
      }
      .hist-desc {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 2px;
        word-break: break-all;
      }
      /* 展開可能な履歴カード(Multi / FreeText のみ、それ以外は cursor 変化なし) */
      .hist-card.hist-expandable {
        cursor: pointer;
      }
      /* iOS Safari は cursor: pointer のない要素タップで click event を発火しないため、
         子要素にも継承させる。delegation listener が子要素タップに反応するための必須条件。 */
      .hist-card.hist-expandable * {
        cursor: pointer;
      }
      .hist-card .hist-toggle {
        display: inline-block;
        margin-left: 4px;
        font-size: 10px;
        color: var(--text-secondary);
        transition: transform 0.15s;
      }
      .hist-card.expanded .hist-toggle {
        transform: rotate(180deg);
      }
      .hist-detail {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--input-border);
        font-size: 13px;
      }
      .hist-detail .tab-row {
        margin-bottom: 8px;
      }
      .hist-detail .tab-row:last-child {
        margin-bottom: 0;
      }
      .hist-detail .tab-question {
        color: var(--text-secondary);
        font-size: 12px;
        margin-bottom: 2px;
        word-break: break-word;
      }
      .hist-detail .tab-selected {
        font-weight: 600;
        color: var(--text-primary);
        word-break: break-word;
      }
      .hist-detail .tab-text {
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        padding: 6px 8px;
        border-radius: 6px;
        margin-top: 4px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        color: var(--text-primary);
        /* 本文 box は text 選択 UX を優先(上の .hist-expandable * を上書き) */
        cursor: text;
      }
      /* v1.12.0 フリーテキスト送信モーダル */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 16px;
      }
      .modal-overlay[hidden] {
        display: none;
      }
      .modal-card {
        background: var(--card-bg);
        color: var(--text-primary);
        border-radius: 12px;
        padding: 20px 18px;
        max-width: 500px;
        width: 100%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }
      .modal-title {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      .modal-desc {
        font-size: 13px;
        color: var(--text-secondary);
        margin: 0 0 12px;
        line-height: 1.5;
      }
      .modal-textarea {
        width: 100%;
        box-sizing: border-box;
        font-size: 14px;
        font-family: inherit;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--input-bg);
        color: var(--text-primary);
        resize: vertical;
        min-height: 120px;
      }
      .modal-textarea:focus {
        outline: 2px solid #1f6feb;
        outline-offset: -1px;
      }
      .modal-err {
        font-size: 13px;
        color: #cc2a22;
        margin: 6px 0 0;
        min-height: 18px;
      }
      .modal-btn-row {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 14px;
      }
      .modal-btn {
        font-size: 14px;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        min-width: 92px;
      }
      .modal-btn-cancel {
        background: var(--border);
        color: var(--text-primary);
      }
      .modal-btn-send {
        background: #1f6feb;
        color: #fff;
      }
      .modal-btn-send:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- タイトル + 言語・テーマ切替 -->
      <div class="header-row">
        <p class="page-title" id="page-title">🤖 承認パネル</p>
        <div class="header-toggles">
          <button class="btn-toggle" id="btn-lang">EN</button>
          <button class="btn-toggle" id="btn-theme">🌙</button>
        </div>
      </div>
      <p class="page-sub" id="page-sub">PCエージェントからの操作を承認・拒否します</p>

      <!-- 接続設定 -->
      <div id="setup-view">
        <div class="card">
          <p class="card-title" id="lbl-setup-title">サーバー接続設定</p>
          <label id="lbl-url">ngrok URL</label>
          <input
            type="text"
            id="inp-url"
            placeholder="https://xxxx.ngrok-free.app"
            autocapitalize="none"
            autocorrect="off"
          />
          <label id="lbl-token">SECRET_TOKEN</label>
          <input type="password" id="inp-token" id="lbl-token-placeholder" placeholder="APPROVAL_TOKEN の値" />
          <button class="btn-primary" id="btn-connect">接続する</button>
          <p class="err" id="setup-err"></p>
        </div>
      </div>

      <!-- メイン画面 -->
      <div id="main-view" style="display: none">
        <div class="top-row">
          <span class="badge-online" id="lbl-connected">● 接続済み</span>
          <button class="btn-disconnect" id="btn-disconnect">切断</button>
        </div>

        <!-- 一括承認ボタン -->
        <button class="btn-bulk" id="btn-bulk-approve" disabled>すべて承認</button>

        <!-- 取得ボタン -->
        <button class="btn-fetch" id="btn-fetch">📥 承認依頼を取得</button>
        <p class="last-fetch" id="last-fetch"></p>
        <p class="err" id="main-err"></p>
        <!-- 正常系の一時通知(他端末で処理済み 等)。エラー(赤)と区別し自動で消える。 -->
        <div id="toast" class="toast" role="status" aria-live="polite"></div>

        <!-- 承認待ち一覧 -->
        <p class="section-label">
          <span id="lbl-pending">承認待ち</span>
          <span id="cnt-badge" class="badge-cnt" style="display: none"></span>
        </p>
        <div id="queue-list"></div>

        <!-- 処理履歴 -->
        <div id="hist-section" style="display: none; margin-top: 1.5rem">
          <div class="hist-head">
            <p class="section-label" id="lbl-history">処理履歴</p>
            <button class="btn-hist-clear" id="btn-hist-clear">すべて削除</button>
          </div>
          <div id="hist-list"></div>
        </div>
      </div>
    </div>

    <!-- v1.12.0: フリーテキスト送信モーダル(Type something / Chat about this 経路) -->
    <div id="freetext-modal" class="modal-overlay" hidden>
      <div class="modal-card" role="dialog" aria-labelledby="freetext-title" aria-modal="true">
        <h2 id="freetext-title" class="modal-title">テキストを送信</h2>
        <p id="freetext-desc" class="modal-desc"></p>
        <!-- v1.12.0: maxlength は approval-server.js / claude-wrapper.js MAX_FREE_TEXT_LEN と同期 -->
        <textarea
          id="freetext-input"
          class="modal-textarea"
          maxlength="2000"
          rows="6"
          placeholder=""
        ></textarea>
        <p id="freetext-err" class="modal-err"></p>
        <div class="modal-btn-row">
          <button id="freetext-cancel" class="modal-btn modal-btn-cancel" type="button">キャンセル</button>
          <button id="freetext-send" class="modal-btn modal-btn-send" type="button">送信</button>
        </div>
      </div>
    </div>

    <script>
      // -------------------------------------------------------
      // i18n
      // -------------------------------------------------------
      const TRANSLATIONS = {
        ja: {
          tabTitle: 'エージェント承認パネル',
          appTitle: '承認パネル',
          pageTitle: '🤖 承認パネル',
          pageSub: 'PCエージェントからの操作を承認・拒否します',
          setupTitle: 'サーバー接続設定',
          lblUrl: 'ngrok URL',
          lblToken: 'SECRET_TOKEN',
          tokenPlaceholder: 'APPROVAL_TOKEN の値',
          btnConnect: '接続する',
          connected: '● 接続済み',
          btnDisconnect: '切断',
          btnBulkApprove: 'すべて承認',
          btnBulkApproveN: (n) => `すべて承認（${n}件）`,
          btnFetch: '📥 承認依頼を取得',
          btnFetching: '取得中…',
          btnProcessing: '処理中…',
          lastFetch: (t) => `最終取得: ${t}`,
          errBothRequired: 'URLとトークンを両方入力してください',
          errConnect: (msg) => `接続失敗: ${msg}`,
          errNetwork: (msg) => `通信エラー: ${msg}`,
          errBulk: (msg) => `一括承認エラー: ${msg}`,
          errOp: (msg) => `操作失敗: ${msg}`,
          alreadyHandled: 'この依頼は既に他の端末で処理されました',
          emptyInitial: '「承認依頼を取得」を押してください',
          emptyQueue: '承認待ちの依頼はありません',
          pending: '承認待ち',
          history: '処理履歴',
          resolvedByPc: 'PC で承認',
          resolvedBySmartphone: 'スマホで承認',
          resolvedByPcDenied: 'PC で拒否',
          resolvedBySmartphoneDenied: 'スマホで拒否',
          histClearAll: 'すべて削除',
          histDeleteOne: '削除',
          histClearConfirm: '履歴をすべて削除しますか?',
          multiBadge: (n) => `複合質問 ${n} 件`,
          subQuestion: (i, n) => `Q${i}/${n}`,
          submitAll: 'すべて送信',
          submitAllProgress: (k, n) => `すべて送信 (${k}/${n})`,
          multiHistory: (n) => `複合質問 ${n} 件回答`,
          btnCancelDialog: 'キャンセル',
          cancelConfirm: 'このダイアログをキャンセル(Esc 相当)しますか?',
          cancelHistory: '(キャンセル)',
          freeTextTitle: 'テキストを送信',
          freeTextDesc: (opt) =>
            `「${opt}」を選んだ後、ここに入力したテキストを Claude TUI に送信します。`,
          freeTextPlaceholder: 'メッセージを入力…',
          freeTextSend: '送信',
          freeTextCancel: 'キャンセル',
          freeTextEmpty: 'テキストを入力してください',
          // 履歴サマリは長さのみ。本文は展開時に details 経由で表示(漏洩防止)
          freeTextHistory: (opt, textLen) => `${opt}(${textLen} 文字)`,
          langToggle: 'EN',
          locale: 'ja-JP',
          // 履歴展開時のラベル
          tabLabel: (n) => `タブ ${n}`,
          selectedLabel: '選択',
        },
        en: {
          tabTitle: 'Agent Approval Panel',
          appTitle: 'Approval Panel',
          pageTitle: '🤖 Approval Panel',
          pageSub: 'Approve or reject actions from your PC agent',
          setupTitle: 'Server Connection',
          lblUrl: 'ngrok URL',
          lblToken: 'SECRET_TOKEN',
          tokenPlaceholder: 'APPROVAL_TOKEN value',
          btnConnect: 'Connect',
          connected: '● Connected',
          btnDisconnect: 'Disconnect',
          btnBulkApprove: 'Approve All',
          btnBulkApproveN: (n) => `Approve All (${n})`,
          btnFetch: '📥 Fetch Requests',
          btnFetching: 'Fetching...',
          btnProcessing: 'Processing...',
          lastFetch: (t) => `Last fetched: ${t}`,
          errBothRequired: 'Please enter both URL and token',
          errConnect: (msg) => `Connection failed: ${msg}`,
          errNetwork: (msg) => `Network error: ${msg}`,
          errBulk: (msg) => `Bulk approve error: ${msg}`,
          errOp: (msg) => `Operation failed: ${msg}`,
          alreadyHandled: 'This request was already handled on another device',
          emptyInitial: 'Press "Fetch Requests" to load',
          emptyQueue: 'No pending requests',
          pending: 'Pending',
          history: 'History',
          resolvedByPc: 'Approved by PC',
          resolvedBySmartphone: 'Approved by smartphone',
          resolvedByPcDenied: 'Denied by PC',
          resolvedBySmartphoneDenied: 'Denied by smartphone',
          histClearAll: 'Clear all',
          histDeleteOne: 'Delete',
          histClearConfirm: 'Clear all history?',
          multiBadge: (n) => `${n} questions`,
          subQuestion: (i, n) => `Q${i}/${n}`,
          submitAll: 'Submit all',
          submitAllProgress: (k, n) => `Submit all (${k}/${n})`,
          multiHistory: (n) => `Answered ${n} questions`,
          btnCancelDialog: 'Cancel',
          cancelConfirm: 'Cancel this dialog (equivalent to Esc)?',
          cancelHistory: '(cancelled)',
          freeTextTitle: 'Send Text',
          freeTextDesc: (opt) =>
            `After selecting "${opt}", the text below will be sent to Claude TUI.`,
          freeTextPlaceholder: 'Enter your message…',
          freeTextSend: 'Send',
          freeTextCancel: 'Cancel',
          freeTextEmpty: 'Please enter some text',
          // history summary shows length only; full body shown only on expand via details (leak prevention)
          freeTextHistory: (opt, textLen) => `${opt} (${textLen} chars)`,
          langToggle: '日本語',
          locale: 'en-US',
          // history expansion labels
          tabLabel: (n) => `Tab ${n}`,
          selectedLabel: 'Selected',
        },
      }

      let lang = localStorage.getItem('approval_lang') || 'ja'
      let theme = localStorage.getItem('approval_theme') || 'light'

      // applyLang から参照される状態（初回呼び出しで TDZ にならないよう先頭で宣言）
      let serverUrl = ''
      let token = ''
      let history = []
      let selectedId = null
      let currentQueueItems = null
      let lastFetchAt = null
      // 複合質問の選択状態 { [itemId]: { [tabIndex]: optionNumberString | {num, text} } }
      const selectedAnswers = {}

      // v1.12.0: フリーテキストの長さ上限。approval-server.js / claude-wrapper.js
      // MAX_FREE_TEXT_LEN および textarea[maxlength] と同期(3 箇所 + HTML 属性)
      const MAX_FREE_TEXT_LEN = 2000

      // 履歴は resolvedAt から 1 時間で自動消去(物理閲覧の露出時間制限)。
      // localStorage 不使用 = タブ閉じで完全消滅、setInterval も page lifetime と同期で cleanup 不要。
      const HISTORY_TTL_MS = 60 * 60 * 1000
      setInterval(() => {
        const cutoff = Date.now() - HISTORY_TTL_MS
        const before = history.length
        history = history.filter((h) => new Date(h.resolvedAt).getTime() >= cutoff)
        if (history.length !== before) renderHistory()
      }, 5 * 60 * 1000)

      function t(key, ...args) {
        const val = TRANSLATIONS[lang][key]
        return typeof val === 'function' ? val(...args) : val
      }

      function applyLang() {
        document.documentElement.lang = lang
        document.getElementById('tab-title').textContent = t('tabTitle')
        document.getElementById('meta-app-title').content = t('appTitle')
        document.getElementById('page-title').textContent = t('pageTitle')
        document.getElementById('page-sub').textContent = t('pageSub')
        document.getElementById('lbl-setup-title').textContent = t('setupTitle')
        document.getElementById('lbl-url').textContent = t('lblUrl')
        document.getElementById('lbl-token').textContent = t('lblToken')
        document.getElementById('inp-token').placeholder = t('tokenPlaceholder')
        document.getElementById('btn-connect').textContent = t('btnConnect')
        document.getElementById('lbl-connected').textContent = t('connected')
        document.getElementById('btn-disconnect').textContent = t('btnDisconnect')
        document.getElementById('btn-fetch').textContent = t('btnFetch')
        document.getElementById('lbl-pending').textContent = t('pending')
        document.getElementById('lbl-history').textContent = t('history')
        document.getElementById('btn-hist-clear').textContent = t('histClearAll')
        document.getElementById('btn-lang').textContent = t('langToggle')

        // 一括承認ボタンのテキストを現在の状態に合わせて更新
        const bulkBtn = document.getElementById('btn-bulk-approve')
        const badge = document.getElementById('cnt-badge')
        if (badge.style.display !== 'none' && badge.textContent) {
          bulkBtn.textContent = t('btnBulkApproveN', badge.textContent)
        } else {
          bulkBtn.textContent = t('btnBulkApprove')
        }

        // 動的に生成された要素の再描画（言語切替時も最新の辞書で再レンダリング）
        if (currentQueueItems !== null) {
          renderQueue(currentQueueItems)
        } else {
          // 接続直後（まだ取得していない）状態の empty メッセージを更新
          const queueEl = document.getElementById('queue-list')
          const mainView = document.getElementById('main-view')
          if (mainView && mainView.style.display !== 'none') {
            const emptyP = queueEl.querySelector('p.empty')
            if (emptyP) emptyP.textContent = t('emptyInitial')
          }
        }
        if (lastFetchAt) {
          document.getElementById('last-fetch').textContent = t('lastFetch', fmt(lastFetchAt))
        }
        if (history.length > 0) {
          renderHistory()
        }
      }

      function applyTheme() {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark')
          document.getElementById('btn-theme').textContent = '☀️'
        } else {
          document.documentElement.removeAttribute('data-theme')
          document.getElementById('btn-theme').textContent = '🌙'
        }
      }

      // 言語切替
      document.getElementById('btn-lang').addEventListener('click', () => {
        lang = lang === 'ja' ? 'en' : 'ja'
        localStorage.setItem('approval_lang', lang)
        applyLang()
      })

      // テーマ切替
      document.getElementById('btn-theme').addEventListener('click', () => {
        theme = theme === 'light' ? 'dark' : 'light'
        localStorage.setItem('approval_theme', theme)
        applyTheme()
      })

      // 初期適用
      applyTheme()
      applyLang()

      // -------------------------------------------------------
      // 設定・接続ロジック
      // -------------------------------------------------------
      // 接続状態・キュー状態は先頭で宣言された（applyLang から参照するため）

      function saveSettings() {
        localStorage.setItem('approval_url', serverUrl)
        localStorage.setItem('approval_token', token)
      }
      function loadSettings() {
        const url = localStorage.getItem('approval_url') || ''
        const tok = localStorage.getItem('approval_token') || ''
        if (url) document.getElementById('inp-url').value = url
        if (tok) document.getElementById('inp-token').value = tok
      }
      loadSettings()

      function fmt(iso) {
        return new Date(iso).toLocaleTimeString(t('locale'), {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
        })
      }

      async function apiFetch(path, options = {}) {
        const headers = {
          'x-secret-token': token,
          'ngrok-skip-browser-warning': '1',
          ...(options.headers || {}),
        }
        const res = await fetch(serverUrl + path, { ...options, headers })
        if (!res.ok) {
          const err = new Error(`HTTP ${res.status}`)
          err.status = res.status // 409(状態競合)等を呼び出し側で判別するため
          throw err
        }
        return res.json()
      }

      // 接続
      document.getElementById('btn-connect').addEventListener('click', async () => {
        const url = document.getElementById('inp-url').value.trim().replace(/\/$/, '')
        const tok = document.getElementById('inp-token').value.trim()
        const errEl = document.getElementById('setup-err')
        errEl.textContent = ''
        if (!url || !tok) {
          errEl.textContent = t('errBothRequired')
          return
        }
        serverUrl = url
        token = tok
        try {
          await apiFetch('/queue')
          saveSettings()
          document.getElementById('setup-view').style.display = 'none'
          document.getElementById('main-view').style.display = 'block'
          document.getElementById('queue-list').innerHTML = `<p class="empty">${t('emptyInitial')}</p>`
        } catch (e) {
          serverUrl = ''
          token = ''
          errEl.textContent = t('errConnect', e.message)
        }
      })

      // 切断
      document.getElementById('btn-disconnect').addEventListener('click', () => {
        serverUrl = ''
        token = ''
        selectedId = null
        currentQueueItems = null
        lastFetchAt = null
        document.getElementById('main-view').style.display = 'none'
        document.getElementById('setup-view').style.display = 'block'
      })

      // 取得ボタン
      document.getElementById('btn-fetch').addEventListener('click', async () => {
        const btn = document.getElementById('btn-fetch')
        btn.disabled = true
        btn.textContent = t('btnFetching')
        await fetchQueue()
        btn.disabled = false
        btn.textContent = t('btnFetch')
      })

      async function fetchQueue() {
        try {
          const data = await apiFetch('/queue')
          currentQueueItems = data
          lastFetchAt = new Date().toISOString()
          renderQueue(data)
          document.getElementById('main-err').textContent = ''
          document.getElementById('last-fetch').textContent = t('lastFetch', fmt(lastFetchAt))
        } catch (e) {
          document.getElementById('main-err').textContent = t('errNetwork', e.message)
        }
      }

      // 前面復帰時のみ最新化(非ポーリング)。タブ可視化 / bfcache 復帰 / window focus で
      // fetchQueue を 1 回だけ呼ぶ = ユーザがパネルを見た瞬間に新規出現 + resolved 消滅を反映。
      // 見ていない間は通信ゼロ(省電力)。二重発火は lastFetchAt で ~1 秒スロットルして回避。
      function refreshOnForeground() {
        if (!serverUrl || !token) return
        if (document.visibilityState !== 'visible') return
        const mainView = document.getElementById('main-view')
        if (!mainView || mainView.style.display === 'none') return
        if (lastFetchAt && Date.now() - new Date(lastFetchAt).getTime() < 1000) return
        fetchQueue()
      }
      document.addEventListener('visibilitychange', refreshOnForeground)
      window.addEventListener('pageshow', refreshOnForeground)
      window.addEventListener('focus', refreshOnForeground)

      // 正常系の一時通知(エラーの赤と区別)。画面下中央に出て自動で消える。
      let toastTimer = null
      function showToast(msg) {
        const el = document.getElementById('toast')
        el.textContent = msg
        el.classList.add('show')
        if (toastTimer) clearTimeout(toastTimer)
        toastTimer = setTimeout(() => el.classList.remove('show'), 4000)
      }

      // 409 = 状態競合の正常系(他端末で既に処理済み = PC 直接応答後の stale カード操作 等)。
      // エラー表示でなく該当カード除去(fetchQueue)+ 一時通知(トースト)で自己修復する。処理したら true。
      async function handleResolveConflict(e, before) {
        if (!e || e.status !== 409) return false
        if (before) before() // freetext 等の固有後始末(モーダルを閉じる等)
        selectedId = null
        await fetchQueue()
        showToast(t('alreadyHandled'))
        return true
      }

      function btnClass(opt, allOptions) {
        const o = opt.toLowerCase()
        // 長文選択肢(AskUserQuestion 型)は左寄せにする
        const longCls = opt.length >= 30 ? ' btn-long' : ''
        if (o === 'no' || o === 'rejected' || o === 'deny' || o === 'cancel')
          return 'btn-option btn-no' + longCls
        if (o === 'yes' || o === 'approved' || o === 'allow')
          return 'btn-option btn-yes' + longCls
        // AskUserQuestion 型では「最後の要素 = 拒否」とは限らないため、
        // キーワード一致しない選択肢はすべて青(その他)で揃える
        return 'btn-option btn-other' + longCls
      }

      function renderQueue(items) {
        const el = document.getElementById('queue-list')
        const badge = document.getElementById('cnt-badge')
        const bulkBtn = document.getElementById('btn-bulk-approve')

        if (items.length === 0) {
          el.innerHTML = `<p class="empty">${t('emptyQueue')}</p>`
          badge.style.display = 'none'
          bulkBtn.disabled = true
          bulkBtn.textContent = t('btnBulkApprove')
          selectedId = null
          return
        }

        badge.textContent = items.length
        badge.style.display = 'inline-block'
        // 一括承認は複合質問を含まない場合のみ enable
        const hasMulti = items.some((i) => Array.isArray(i.tabs) && i.tabs.length > 0)
        bulkBtn.disabled = hasMulti
        bulkBtn.textContent = hasMulti
          ? t('btnBulkApprove')
          : t('btnBulkApproveN', items.length)

        if (selectedId && !items.find((i) => i.id === selectedId)) selectedId = null

        // 残らない item の選択状態は破棄
        for (const id of Object.keys(selectedAnswers)) {
          if (!items.find((i) => i.id === id)) delete selectedAnswers[id]
        }

        el.innerHTML = ''
        items.forEach((item) => {
          if (Array.isArray(item.tabs) && item.tabs.length > 0) {
            el.appendChild(renderMultiCard(item))
          } else {
            el.appendChild(renderSingleCard(item))
          }
        })
      }

      function renderSingleCard(item) {
        const div = document.createElement('div')
        const isSelected = item.id === selectedId
        div.className = 'req-card' + (isSelected ? ' selected' : '')
        div.dataset.id = item.id

        // v1.18.0 (Phase 3c): 自由記入宣言はカード単位で 1 度だけ束ねる(per-option の使い捨て
        // 空配列確保を避ける)。claude は null = []。
        const fto = item.freeTextOptions || []
        const btnHtml = isSelected
          ? `<div class="btn-area">${item.options
              .map((opt, oi) => {
                // Chat about this は遠隔不能なので UI で非表示。num は元の oi+1 を
                // 保持し wrapper / サーバーへの番号と整合させる(複合質問と同方式)。
                if (CHAT_ABOUT_RE.test(opt)) return ''
                const num = String(oi + 1)
                // v1.18.0 (Phase 3c): フリーテキスト判定を render 確定メタ化。Type something に加え
                // codex 自由記入((tab))= item.freeTextOptions(1-based)宣言で自由記入モーダルを開く。
                const isFreeText = FREE_TEXT_OPTION_RE.test(opt) || fto.includes(oi + 1)
                return `<button class="${btnClass(opt, item.options)}" data-id="${item.id}" data-num="${num}" data-answer="${escHtml(opt)}" data-freetext="${isFreeText ? '1' : '0'}">${escHtml(opt)}</button>`
              })
              .join('')}<button class="btn-cancel-dialog" data-cancel-id="${item.id}">${t('btnCancelDialog')}</button></div>`
          : ''

        div.innerHTML = `
      <p class="req-time">${fmt(item.createdAt)}</p>
      <p class="req-desc${isSelected ? '' : ' req-desc-short'}">${escHtml(item.description)}</p>
      ${btnHtml}`
        return div
      }

      function renderMultiCard(item) {
        const div = document.createElement('div')
        div.className = 'req-card multi-card'
        div.dataset.id = item.id
        div.dataset.multi = '1'

        const sel = selectedAnswers[item.id] || {}
        const n = item.tabs.length
        const answeredCount = Object.keys(sel).filter((k) => sel[k]).length

        const subHtml = item.tabs
          .map((tab, ti) => {
            const tabSel = sel[ti]
            // v1.12.0: tabSel は文字列(数字のみ)or { num, text }(Type something 入力済み)
            const selNum = typeof tabSel === 'string' ? tabSel : tabSel && tabSel.num
            const hasText = tabSel && typeof tabSel === 'object' && tabSel.text != null
            const opts = (tab.options || [])
              .map((opt, oi) => {
                // v1.12.0: Chat about this は遠隔不能なので UI で非表示。
                // num は元の oi+1 を保持(wrapper への番号と整合させる)
                if (CHAT_ABOUT_RE.test(opt)) return ''
                const num = String(oi + 1)
                const isSel = selNum === num
                const isFreeText = FREE_TEXT_OPTION_RE.test(opt)
                const mark = isSel && hasText && isFreeText ? ' ✓' : ''
                const cls = btnClass(opt, tab.options) + (isSel ? ' selected' : '')
                return `<button class="${cls}" data-multi-id="${item.id}" data-tab="${ti}" data-num="${num}" data-answer="${escHtml(opt)}">${escHtml(opt)}${mark}</button>`
              })
              .join('')
            const labelHtml = `<p class="sub-label">${t('subQuestion', ti + 1, n)}${tab.label ? ' · ' + escHtml(tab.label) : ''}</p>`
            return `<div class="sub-question">
              ${labelHtml}
              <p class="sub-prompt">${escHtml(tab.prompt)}</p>
              <div class="btn-area">${opts}</div>
            </div>`
          })
          .join('')

        const submitDisabled = answeredCount < n ? 'disabled' : ''
        const submitLabel =
          answeredCount < n ? t('submitAllProgress', answeredCount, n) : t('submitAll')

        div.innerHTML = `
      <p class="req-time">${fmt(item.createdAt)}</p>
      <p class="req-desc">${escHtml(item.description)} <span class="multi-badge">${t('multiBadge', n)}</span></p>
      ${subHtml}
      <div class="multi-actions">
        <button class="btn-submit-all" data-submit-id="${item.id}" ${submitDisabled}>${submitLabel}</button>
        <button class="btn-cancel-dialog" data-cancel-id="${item.id}">${t('btnCancelDialog')}</button>
      </div>`
        return div
      }

      function escHtml(str) {
        // HTML 属性内に直接埋め込む箇所(例: data-answer="${escHtml(opt)}")があるため、
        // " と ' もエスケープする(属性値の引用符を抜けるインジェクションを防ぐ)。
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }

      document.getElementById('queue-list').addEventListener('click', async (e) => {
        // v1.12.0: ダイアログキャンセル(Esc 相当)
        const cancelBtn = e.target.closest('button[data-cancel-id]')
        if (cancelBtn && !cancelBtn.disabled) {
          if (!confirm(t('cancelConfirm'))) return
          await cancelItem(cancelBtn.dataset.cancelId, cancelBtn)
          return
        }
        // 複合質問の「すべて送信」ボタン
        const submitBtn = e.target.closest('button[data-submit-id]')
        if (submitBtn && !submitBtn.disabled) {
          await resolveMultiItem(submitBtn.dataset.submitId, submitBtn)
          return
        }
        // 複合質問のサブ選択肢ボタン
        const multiBtn = e.target.closest('button[data-multi-id]')
        if (multiBtn) {
          const id = multiBtn.dataset.multiId
          const ti = multiBtn.dataset.tab
          const num = multiBtn.dataset.num
          const ans = multiBtn.dataset.answer || ''
          // v1.12.0: Type something / Chat about this はテキスト入力モーダルを開く
          // (送信はその場ではなく、すべての回答が揃ってから「すべて送信」で実施)
          if (FREE_TEXT_OPTION_RE.test(ans)) {
            openFreeTextModal(id, ans, { tab: ti, num })
            return
          }
          if (!selectedAnswers[id]) selectedAnswers[id] = {}
          selectedAnswers[id][ti] = num
          // 即再描画(currentQueueItems が最新)
          if (currentQueueItems) renderQueue(currentQueueItems)
          return
        }
        // 単一質問の通常ボタン
        const btn = e.target.closest('button[data-id]')
        if (btn) {
          const label = btn.dataset.answer
          const num = btn.dataset.num
          // v1.18.0 (Phase 3c): フリーテキスト判定は render 確定メタ(data-freetext)を信頼。
          // Type something(v1.12.0)に加え codex 自由記入((tab))でも入力モーダルを開く。
          if (btn.dataset.freetext === '1') {
            openFreeTextModal(btn.dataset.id, label, null, num)
            return
          }
          // v1.15.6: 送信は番号(num)、表示・履歴はラベル(label)。option 本文の
          // 折返し揺れに依存しない安定キーで照合させる(複合質問と同方式)。
          await resolveItem(btn.dataset.id, num, btn.closest('.btn-area'), false, label)
          return
        }
        // 単一質問カード選択(複合質問カードはトグル不要なので除外)
        const card = e.target.closest('.req-card:not(.multi-card)')
        if (card) {
          selectedId = selectedId === card.dataset.id ? null : card.dataset.id
          await fetchQueue()
        }
      })

      document.getElementById('btn-bulk-approve').addEventListener('click', async () => {
        const btn = document.getElementById('btn-bulk-approve')
        btn.disabled = true
        btn.textContent = t('btnProcessing')
        try {
          const items = await apiFetch('/queue')
          for (const item of items) {
            // 複合質問は一括承認の対象外(個別タブの選択が必要)
            if (Array.isArray(item.tabs) && item.tabs.length > 0) continue
            await resolveItem(item.id, 'Yes', null, true)
          }
        } catch (e) {
          document.getElementById('main-err').textContent = t('errBulk', e.message)
        }
        await fetchQueue()
      })

      // 承認元の端末種別は User-Agent で判定(URL hostname だと PC レスポンシブモードで
      // localhost に対して承認操作したとき常に 'pc' 扱いになる問題があった)。
      // DevTools のスマホエミュレートで UA も切替えれば 'smartphone' 判定。
      const resolvedBy = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
        ? 'smartphone'
        : 'pc'

      function pushHistory(description, answer, details) {
        history.unshift({
          histId:
            (crypto.randomUUID && crypto.randomUUID()) ||
            `${Date.now()}-${Math.random().toString(36).slice(2)}`,
          description,
          answer,
          details,
          resolvedBy,
          resolvedAt: new Date().toISOString(),
        })
        if (history.length > 20) history.pop()
        renderHistory()
      }

      // v1.12.0: ダイアログ全体をキャンセル(PC TUI の Esc 相当)。
      // wrapper が Esc 注入 → ダイアログ消失 → 通常チャットに戻る。
      async function cancelItem(id, btn) {
        btn.disabled = true
        btn.textContent = t('btnProcessing')
        try {
          await apiFetch(`/resolve/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'cancel', resolvedBy }),
          })
          pushHistory(getDescription(id), t('cancelHistory'))
          delete selectedAnswers[id]
          selectedId = null
          await fetchQueue()
        } catch (e) {
          if (await handleResolveConflict(e)) return
          document.getElementById('main-err').textContent = t('errOp', e.message)
          btn.disabled = false
          btn.textContent = t('btnCancelDialog')
        }
      }

      async function resolveMultiItem(id, submitBtn) {
        const sel = selectedAnswers[id] || {}
        const item = (currentQueueItems || []).find((i) => i.id === id)
        if (!item || !Array.isArray(item.tabs)) return
        const answers = []
        for (let i = 0; i < item.tabs.length; i++) {
          const v = sel[i]
          if (!v) return // 未選択あり → 何もしない
          // v1.12.0: v は文字列(数字のみ)or { num, text }(Type something 入力済み)
          answers.push(typeof v === 'string' ? v : { num: v.num, text: v.text })
        }
        submitBtn.disabled = true
        submitBtn.textContent = t('btnProcessing')
        try {
          await apiFetch(`/resolve/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answers, resolvedBy }),
          })
          // サマリ表示と展開用 details を answers 1 周回で同時組立
          const nums = []
          const detailTabs = []
          let textCount = 0
          answers.forEach((a, i) => {
            const isStr = typeof a === 'string'
            const num = isStr ? a : a.num
            const text = isStr ? undefined : a.text
            if (text) textCount++
            nums.push(num)
            const opts = item.tabs[i].options || []
            detailTabs.push({
              question: item.tabs[i].prompt || '',
              selectedNum: num,
              selectedLabel: opts[parseInt(num, 10) - 1] || '',
              text,
            })
          })
          pushHistory(
            getDescription(id),
            t('multiHistory', item.tabs.length) +
              ' [' +
              nums.join(',') +
              ']' +
              (textCount > 0 ? ` (text×${textCount})` : ''),
            { kind: 'multi', tabs: detailTabs }
          )
          delete selectedAnswers[id]
          await fetchQueue()
        } catch (e) {
          if (await handleResolveConflict(e)) return
          document.getElementById('main-err').textContent = t('errOp', e.message)
          submitBtn.disabled = false
          submitBtn.textContent = t('submitAll')
        }
      }

      // v1.12.0: Claude TUI 組み込みフッタ option(Type something / Chat about this)を検出。
      // これらの option を押すと wrapper 側で自由入力モードへ遷移するので、UI 側で
      // テキスト入力モーダルを出して "answer + text" をサーバへ送る。
      const FREE_TEXT_OPTION_RE = /^Type\s+something\.?$/i
      // v1.12.0: Chat about this は遠隔不能(数字キー単独で選べず、選択するとダイアログ
      // 全体を抜けて通常チャットへ移行する仕様)。UI 側で非表示にし、選びたい場合は
      // 下部の「キャンセル」ボタンで Esc 相当の操作を行う。
      const CHAT_ABOUT_RE = /^Chat\s+about\s+this\.?$/i

      let activeFreeTextItemId = null
      let activeFreeTextAnswer = null
      // v1.12.0: Multi タブから開いた場合のみ { tab, num }、single なら null
      let activeFreeTextMulti = null
      // v1.15.6: single 経路でサーバーへ送る番号(Multi 経路では null)
      let activeFreeTextNum = null

      function openFreeTextModal(itemId, answer, multiOpts, singleNum) {
        activeFreeTextItemId = itemId
        activeFreeTextAnswer = answer
        activeFreeTextMulti = multiOpts || null
        activeFreeTextNum = singleNum != null ? singleNum : null
        const modal = document.getElementById('freetext-modal')
        const title = document.getElementById('freetext-title')
        const desc = document.getElementById('freetext-desc')
        const input = document.getElementById('freetext-input')
        const err = document.getElementById('freetext-err')
        const sendBtn = document.getElementById('freetext-send')
        const cancelBtn = document.getElementById('freetext-cancel')
        title.textContent = t('freeTextTitle')
        desc.textContent = t('freeTextDesc', answer)
        input.value = ''
        input.placeholder = t('freeTextPlaceholder')
        err.textContent = ''
        sendBtn.textContent = t('freeTextSend')
        sendBtn.disabled = false
        cancelBtn.textContent = t('freeTextCancel')
        modal.hidden = false
        // 開いたらフォーカスを textarea へ
        setTimeout(() => input.focus(), 30)
      }

      function closeFreeTextModal() {
        const modal = document.getElementById('freetext-modal')
        modal.hidden = true
        activeFreeTextItemId = null
        activeFreeTextAnswer = null
        activeFreeTextMulti = null
        activeFreeTextNum = null
      }

      document.getElementById('freetext-cancel').addEventListener('click', () => {
        closeFreeTextModal()
      })

      document.getElementById('freetext-send').addEventListener('click', async () => {
        if (!activeFreeTextItemId || !activeFreeTextAnswer) {
          closeFreeTextModal()
          return
        }
        const input = document.getElementById('freetext-input')
        const err = document.getElementById('freetext-err')
        const sendBtn = document.getElementById('freetext-send')
        // クライアント側 sanitize: 制御文字 + 改行除去(サーバ側でも同様の sanitize)
        const raw = input.value || ''
        // v1.12.0 (codex 3rd W002 修正): server / wrapper と統一して C1 (\x80-\x9F) も除去
        const clean = raw.replace(/[\x00-\x1F\x7F\x80-\x9F]/g, '')
        if (clean.length === 0) {
          err.textContent = t('freeTextEmpty')
          return
        }
        if (clean.length > MAX_FREE_TEXT_LEN) {
          err.textContent = `(>${MAX_FREE_TEXT_LEN} chars)`
          return
        }
        err.textContent = ''
        sendBtn.disabled = true
        const id = activeFreeTextItemId
        const answer = activeFreeTextAnswer
        // v1.12.0: Multi 経路は state に保存して閉じる(送信は「すべて送信」時)
        if (activeFreeTextMulti) {
          const { tab: mTab, num: mNum } = activeFreeTextMulti
          if (!selectedAnswers[id]) selectedAnswers[id] = {}
          selectedAnswers[id][mTab] = { num: mNum, text: clean }
          closeFreeTextModal()
          if (currentQueueItems) renderQueue(currentQueueItems)
          return
        }
        try {
          // v1.15.6: 送信は番号(activeFreeTextNum)、表示は option ラベル(answer)。
          // option 本文の折返し揺れに依存しない安定キーで照合させる。
          await apiFetch(`/resolve/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answer: activeFreeTextNum, text: clean, resolvedBy }),
          })
          pushHistory(
            getDescription(id),
            t('freeTextHistory', answer, clean.length),
            { kind: 'freeText', option: answer, text: clean }
          )
          closeFreeTextModal()
          selectedId = null
          await fetchQueue()
        } catch (e) {
          if (await handleResolveConflict(e, closeFreeTextModal)) return
          err.textContent = t('errOp', e.message)
          sendBtn.disabled = false
        }
      })

      // モーダル背景クリックでキャンセル(ただし modal-card 内クリックは無視)
      document.getElementById('freetext-modal').addEventListener('click', (e) => {
        if (e.target.id === 'freetext-modal') closeFreeTextModal()
      })

      async function resolveItem(id, answer, btnArea, isBulk = false, label = null) {
        if (btnArea) btnArea.querySelectorAll('button').forEach((b) => (b.disabled = true))
        try {
          await apiFetch(`/resolve/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answer, resolvedBy }),
          })
          // v1.15.6: answer は送信値(単一質問は番号)。履歴表示は label(ラベル)を
          // 優先し、未指定(一括承認 'Yes' 等)は従来通り answer を表示。
          pushHistory(getDescription(id), label != null ? label : answer)
          if (!isBulk) {
            selectedId = null
            await fetchQueue()
          }
        } catch (e) {
          if (await handleResolveConflict(e)) return
          document.getElementById('main-err').textContent = t('errOp', e.message)
          if (btnArea) btnArea.querySelectorAll('button').forEach((b) => (b.disabled = false))
        }
      }

      function getDescription(id) {
        const card = document.querySelector(`.req-card[data-id="${id}"]`)
        return card ? card.querySelector('.req-desc').textContent : id
      }

      function renderHistory() {
        const sec = document.getElementById('hist-section')
        const el = document.getElementById('hist-list')
        if (history.length === 0) {
          sec.style.display = 'none'
          return
        }
        sec.style.display = 'block'
        el.innerHTML = ''
        history.forEach((item) => {
          const div = document.createElement('div')
          div.className = 'hist-card'
          div.dataset.histId = item.histId || ''
          const a = item.answer.toLowerCase()
          const isNo = a === 'no' || a === 'rejected' || a === 'deny' || a === 'cancel'
          const color = isNo ? '#cc2a22' : '#1a7f37'
          const byLabel = (() => {
            if (!item.resolvedBy) return escHtml(item.answer)
            if (item.resolvedBy === 'pc') return t(isNo ? 'resolvedByPcDenied' : 'resolvedByPc')
            return t(isNo ? 'resolvedBySmartphoneDenied' : 'resolvedBySmartphone')
          })()
          const hasDetail = item.details && typeof item.details === 'object'
          if (hasDetail) div.classList.add('hist-expandable')
          const toggle = hasDetail ? ' <span class="hist-toggle">▼</span>' : ''
          div.innerHTML = `
      <button class="btn-hist-del" type="button" aria-label="${t('histDeleteOne')}" title="${t('histDeleteOne')}">×</button>
      <p class="hist-label" style="color:${color}">${byLabel} <span style="color:var(--text-secondary);font-weight:400;font-size:12px;">${fmt(item.resolvedAt)}</span>${toggle}</p>
      <p class="hist-desc">${escHtml(item.description)}</p>`
          // 詳細部は createElement + textContent で構築。innerHTML 経路に混ぜると
          // 1 箇所の escHtml 漏れで stored-like DOM XSS の表示面化となる(意図的分離)。
          if (hasDetail) {
            div.appendChild(buildHistDetail(item.details))
          }
          el.appendChild(div)
        })
      }

      function buildHistDetail(details) {
        const wrap = document.createElement('div')
        wrap.className = 'hist-detail'
        wrap.hidden = true
        if (details.kind === 'multi' && Array.isArray(details.tabs)) {
          details.tabs.forEach((tab, i) => {
            const row = document.createElement('div')
            row.className = 'tab-row'
            const q = document.createElement('p')
            q.className = 'tab-question'
            q.textContent = `${t('tabLabel', i + 1)}: ${tab.question || ''}`
            row.appendChild(q)
            const sel = document.createElement('p')
            sel.className = 'tab-selected'
            sel.textContent = `${t('selectedLabel')}: ${tab.selectedNum}. ${tab.selectedLabel || ''}`
            row.appendChild(sel)
            if (tab.text) {
              const txt = document.createElement('div')
              txt.className = 'tab-text'
              txt.textContent = tab.text
              row.appendChild(txt)
            }
            wrap.appendChild(row)
          })
        } else if (details.kind === 'freeText') {
          const sel = document.createElement('p')
          sel.className = 'tab-selected'
          sel.textContent = `${t('selectedLabel')}: ${details.option || ''}`
          wrap.appendChild(sel)
          if (details.text) {
            const txt = document.createElement('div')
            txt.className = 'tab-text'
            txt.textContent = details.text
            wrap.appendChild(txt)
          }
        }
        return wrap
      }

      // 履歴の個別「×」削除 + カード全体タップで展開トグル
      document.getElementById('hist-list').addEventListener('click', (e) => {
        const btn = e.target.closest('.btn-hist-del')
        if (btn) {
          const card = btn.closest('.hist-card')
          const id = card?.dataset.histId
          if (!id) return
          history = history.filter((h) => h.histId !== id)
          renderHistory()
          return
        }
        // 展開可能カードのトグル(× ボタン押下は上の早期 return で除外済)
        const card = e.target.closest('.hist-card.hist-expandable')
        if (card) {
          card.classList.toggle('expanded')
          const detail = card.querySelector('.hist-detail')
          if (detail) detail.hidden = !card.classList.contains('expanded')
        }
      })

      // 履歴「すべて削除」: ローカル history を空にし、サーバー側 resolved も掃除する。
      // サーバー側 DELETE /history は失敗してもローカル UI の見た目は更新する
      // （resolved は GC でいずれ消えるため、UX を止めない方を優先）。
      document.getElementById('btn-hist-clear').addEventListener('click', async () => {
        if (history.length === 0) return
        if (!window.confirm(t('histClearConfirm'))) return
        history = []
        renderHistory()
        try {
          await apiFetch('/history', { method: 'DELETE' })
        } catch (e) {
          // サーバー側削除に失敗してもローカル表示は既にクリアされている
          document.getElementById('main-err').textContent = t('errOp', e.message)
        }
      })
    </script>
  </body>
</html>
