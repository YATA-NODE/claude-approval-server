<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="承認パネル" />
    <title>エージェント承認パネル</title>
    <style>
      :root {
        --bg: #f2f2f7;
        --card-bg: #ffffff;
        --text-primary: #1c1c1e;
        --text-secondary: #8e8e93;
        --input-bg: #ffffff;
        --input-border: #d1d1d6;
        --shadow: rgba(0, 0, 0, 0.08);
        --badge-online-bg: #d1f0d8;
        --badge-online-text: #1a7f37;
        --req-card-border: #ff9f0a;
        --req-card-selected-border: #007aff;
        --req-card-selected-shadow: rgba(0, 122, 255, 0.18);
        --hist-opacity: 0.75;
      }
      [data-theme='dark'] {
        --bg: #1c1c1e;
        --card-bg: #2c2c2e;
        --text-primary: #f2f2f7;
        --text-secondary: #8e8e93;
        --input-bg: #3a3a3c;
        --input-border: #48484a;
        --shadow: rgba(0, 0, 0, 0.3);
        --badge-online-bg: #1a3d25;
        --badge-online-text: #30d158;
        --req-card-border: #ff9f0a;
        --req-card-selected-border: #0a84ff;
        --req-card-selected-shadow: rgba(10, 132, 255, 0.25);
        --hist-opacity: 0.6;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        min-height: 100vh;
        transition: background 0.2s, color 0.2s;
      }
      .wrap {
        max-width: 480px;
        margin: 0 auto;
        padding: 16px;
      }

      /* ヘッダー行（タイトル + トグルボタン群） */
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 4px;
        padding-top: 8px;
      }
      .page-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-primary);
      }
      .header-toggles {
        display: flex;
        gap: 6px;
        margin-top: 2px;
      }
      .btn-toggle {
        padding: 4px 10px;
        border-radius: 20px;
        border: 1px solid var(--input-border);
        background: var(--card-bg);
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .btn-toggle:active {
        opacity: 0.7;
      }

      .page-sub {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 20px;
      }

      /* カード */
      .card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 14px;
        box-shadow: 0 1px 3px var(--shadow);
      }
      .card-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 14px;
      }
      label {
        font-size: 13px;
        color: var(--text-secondary);
        display: block;
        margin-bottom: 4px;
      }
      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--input-border);
        font-size: 14px;
        margin-bottom: 10px;
        background: var(--input-bg);
        color: var(--text-primary);
        outline: none;
        transition: border-color 0.15s, background 0.2s;
      }
      input:focus {
        border-color: #007aff;
      }
      [data-theme='dark'] input:focus {
        border-color: #0a84ff;
      }
      .btn-primary {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        background: #007aff;
        color: #fff;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-primary:active {
        background: #0062cc;
      }
      [data-theme='dark'] .btn-primary {
        background: #0a84ff;
      }

      /* 接続後ヘッダー行 */
      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .badge-online {
        display: inline-block;
        background: var(--badge-online-bg);
        color: var(--badge-online-text);
        border-radius: 20px;
        padding: 3px 10px;
        font-size: 12px;
        font-weight: 600;
      }
      .btn-disconnect {
        background: none;
        border: none;
        color: #ff3b30;
        font-size: 13px;
        cursor: pointer;
      }
      [data-theme='dark'] .btn-disconnect {
        color: #ff453a;
      }

      /* 一括承認ボタン */
      .btn-bulk {
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        background: #34c759;
        color: #fff;
        border: none;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 8px;
      }
      .btn-bulk:active {
        background: #28a745;
      }
      .btn-bulk:disabled {
        background: var(--text-secondary);
        cursor: default;
      }
      [data-theme='dark'] .btn-bulk {
        background: #30d158;
      }
      [data-theme='dark'] .btn-bulk:active {
        background: #25a244;
      }

      /* 取得ボタン */
      .btn-fetch {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        background: #007aff;
        color: #fff;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 16px;
      }
      .btn-fetch:active {
        background: #0062cc;
      }
      .btn-fetch:disabled {
        background: var(--text-secondary);
      }
      [data-theme='dark'] .btn-fetch {
        background: #0a84ff;
      }
      .last-fetch {
        font-size: 12px;
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 12px;
      }
      .err {
        color: #ff3b30;
        font-size: 13px;
        margin-top: 8px;
      }
      [data-theme='dark'] .err {
        color: #ff453a;
      }

      /* セクションラベル */
      .section-label {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 10px;
      }
      .badge-cnt {
        display: inline-block;
        background: #ff3b30;
        color: #fff;
        border-radius: 20px;
        padding: 1px 8px;
        font-size: 12px;
        margin-left: 6px;
      }
      [data-theme='dark'] .badge-cnt {
        background: #ff453a;
      }

      /* 依頼カード */
      .req-card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 10px;
        border-left: 4px solid var(--req-card-border);
        box-shadow: 0 1px 3px var(--shadow);
        cursor: pointer;
        user-select: none;
        transition: box-shadow 0.15s;
      }
      .req-card.selected {
        border-left-color: var(--req-card-selected-border);
        box-shadow: 0 2px 8px var(--req-card-selected-shadow);
      }
      .req-card:active {
        opacity: 0.85;
      }
      .req-time {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 4px;
      }
      .req-desc {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.5;
        word-break: break-all;
      }
      .req-desc-short {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* アクションボタンエリア */
      .btn-area {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .btn-option {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-option:active {
        opacity: 0.7;
      }
      .btn-option:disabled {
        opacity: 0.4;
      }
      .btn-yes {
        background: #34c759;
        color: #fff;
      }
      .btn-no {
        background: #ff3b30;
        color: #fff;
      }
      .btn-other {
        background: #007aff;
        color: #fff;
      }
      [data-theme='dark'] .btn-yes {
        background: #30d158;
      }
      [data-theme='dark'] .btn-no {
        background: #ff453a;
      }
      [data-theme='dark'] .btn-other {
        background: #0a84ff;
      }

      /* 空状態 */
      .empty {
        text-align: center;
        color: var(--text-secondary);
        font-size: 14px;
        padding: 2rem 0;
        line-height: 1.8;
      }

      /* 履歴 */
      .hist-card {
        background: var(--card-bg);
        border-radius: 10px;
        padding: 10px 14px;
        margin-bottom: 8px;
        opacity: var(--hist-opacity);
      }
      .hist-label {
        font-size: 13px;
        font-weight: 600;
      }
      .hist-desc {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 2px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- タイトル + 言語・テーマ切替 -->
      <div class="header-row">
        <p class="page-title" id="page-title">🤖 承認パネル</p>
        <div class="header-toggles">
          <button class="btn-toggle" id="btn-lang">EN</button>
          <button class="btn-toggle" id="btn-theme">🌙</button>
        </div>
      </div>
      <p class="page-sub" id="page-sub">PCエージェントからの操作を承認・拒否します</p>

      <!-- 接続設定 -->
      <div id="setup-view">
        <div class="card">
          <p class="card-title" id="lbl-setup-title">サーバー接続設定</p>
          <label id="lbl-url">ngrok URL</label>
          <input
            type="text"
            id="inp-url"
            placeholder="https://xxxx.ngrok-free.app"
            autocapitalize="none"
            autocorrect="off"
          />
          <label id="lbl-token">SECRET_TOKEN</label>
          <input type="password" id="inp-token" id="lbl-token-placeholder" placeholder="APPROVAL_TOKEN の値" />
          <button class="btn-primary" id="btn-connect">接続する</button>
          <p class="err" id="setup-err"></p>
        </div>
      </div>

      <!-- メイン画面 -->
      <div id="main-view" style="display: none">
        <div class="top-row">
          <span class="badge-online" id="lbl-connected">● 接続済み</span>
          <button class="btn-disconnect" id="btn-disconnect">切断</button>
        </div>

        <!-- 一括承認ボタン -->
        <button class="btn-bulk" id="btn-bulk-approve" disabled>すべて承認</button>

        <!-- 取得ボタン -->
        <button class="btn-fetch" id="btn-fetch">📥 承認依頼を取得</button>
        <p class="last-fetch" id="last-fetch"></p>
        <p class="err" id="main-err"></p>

        <!-- 承認待ち一覧 -->
        <p class="section-label">
          <span id="lbl-pending">承認待ち</span>
          <span id="cnt-badge" class="badge-cnt" style="display: none"></span>
        </p>
        <div id="queue-list"></div>

        <!-- 処理履歴 -->
        <div id="hist-section" style="display: none; margin-top: 1.5rem">
          <p class="section-label" id="lbl-history">処理履歴</p>
          <div id="hist-list"></div>
        </div>
      </div>
    </div>

    <script>
      // -------------------------------------------------------
      // i18n
      // -------------------------------------------------------
      const TRANSLATIONS = {
        ja: {
          pageTitle: '🤖 承認パネル',
          pageSub: 'PCエージェントからの操作を承認・拒否します',
          setupTitle: 'サーバー接続設定',
          lblUrl: 'ngrok URL',
          lblToken: 'SECRET_TOKEN',
          tokenPlaceholder: 'APPROVAL_TOKEN の値',
          btnConnect: '接続する',
          connected: '● 接続済み',
          btnDisconnect: '切断',
          btnBulkApprove: 'すべて承認',
          btnBulkApproveN: (n) => `すべて承認（${n}件）`,
          btnFetch: '📥 承認依頼を取得',
          btnFetching: '取得中…',
          btnProcessing: '処理中…',
          lastFetch: (t) => `最終取得: ${t}`,
          errBothRequired: 'URLとトークンを両方入力してください',
          errConnect: (msg) => `接続失敗: ${msg}`,
          errNetwork: (msg) => `通信エラー: ${msg}`,
          errBulk: (msg) => `一括承認エラー: ${msg}`,
          errOp: (msg) => `操作失敗: ${msg}`,
          emptyInitial: '「承認依頼を取得」を押してください',
          emptyQueue: '承認待ちの依頼はありません',
          pending: '承認待ち',
          history: '処理履歴',
          langToggle: 'EN',
          locale: 'ja-JP',
        },
        en: {
          pageTitle: '🤖 Approval Panel',
          pageSub: 'Approve or reject actions from your PC agent',
          setupTitle: 'Server Connection',
          lblUrl: 'ngrok URL',
          lblToken: 'SECRET_TOKEN',
          tokenPlaceholder: 'APPROVAL_TOKEN value',
          btnConnect: 'Connect',
          connected: '● Connected',
          btnDisconnect: 'Disconnect',
          btnBulkApprove: 'Approve All',
          btnBulkApproveN: (n) => `Approve All (${n})`,
          btnFetch: '📥 Fetch Requests',
          btnFetching: 'Fetching...',
          btnProcessing: 'Processing...',
          lastFetch: (t) => `Last fetched: ${t}`,
          errBothRequired: 'Please enter both URL and token',
          errConnect: (msg) => `Connection failed: ${msg}`,
          errNetwork: (msg) => `Network error: ${msg}`,
          errBulk: (msg) => `Bulk approve error: ${msg}`,
          errOp: (msg) => `Operation failed: ${msg}`,
          emptyInitial: 'Press "Fetch Requests" to load',
          emptyQueue: 'No pending requests',
          pending: 'Pending',
          history: 'History',
          langToggle: '日本語',
          locale: 'en-US',
        },
      }

      let lang = localStorage.getItem('approval_lang') || 'ja'
      let theme = localStorage.getItem('approval_theme') || 'light'

      function t(key, ...args) {
        const val = TRANSLATIONS[lang][key]
        return typeof val === 'function' ? val(...args) : val
      }

      function applyLang() {
        document.documentElement.lang = lang
        document.getElementById('page-title').textContent = t('pageTitle')
        document.getElementById('page-sub').textContent = t('pageSub')
        document.getElementById('lbl-setup-title').textContent = t('setupTitle')
        document.getElementById('lbl-url').textContent = t('lblUrl')
        document.getElementById('lbl-token').textContent = t('lblToken')
        document.getElementById('inp-token').placeholder = t('tokenPlaceholder')
        document.getElementById('btn-connect').textContent = t('btnConnect')
        document.getElementById('lbl-connected').textContent = t('connected')
        document.getElementById('btn-disconnect').textContent = t('btnDisconnect')
        document.getElementById('btn-fetch').textContent = t('btnFetch')
        document.getElementById('lbl-pending').textContent = t('pending')
        document.getElementById('lbl-history').textContent = t('history')
        document.getElementById('btn-lang').textContent = t('langToggle')

        // 一括承認ボタンのテキストを現在の状態に合わせて更新
        const bulkBtn = document.getElementById('btn-bulk-approve')
        const badge = document.getElementById('cnt-badge')
        if (badge.style.display !== 'none' && badge.textContent) {
          bulkBtn.textContent = t('btnBulkApproveN', badge.textContent)
        } else {
          bulkBtn.textContent = t('btnBulkApprove')
        }
      }

      function applyTheme() {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark')
          document.getElementById('btn-theme').textContent = '☀️'
        } else {
          document.documentElement.removeAttribute('data-theme')
          document.getElementById('btn-theme').textContent = '🌙'
        }
      }

      // 言語切替
      document.getElementById('btn-lang').addEventListener('click', () => {
        lang = lang === 'ja' ? 'en' : 'ja'
        localStorage.setItem('approval_lang', lang)
        applyLang()
      })

      // テーマ切替
      document.getElementById('btn-theme').addEventListener('click', () => {
        theme = theme === 'light' ? 'dark' : 'light'
        localStorage.setItem('approval_theme', theme)
        applyTheme()
      })

      // 初期適用
      applyTheme()
      applyLang()

      // -------------------------------------------------------
      // 設定・接続ロジック
      // -------------------------------------------------------
      let serverUrl = ''
      let token = ''
      let history = []
      let selectedId = null

      function saveSettings() {
        localStorage.setItem('approval_url', serverUrl)
        localStorage.setItem('approval_token', token)
      }
      function loadSettings() {
        const url = localStorage.getItem('approval_url') || ''
        const tok = localStorage.getItem('approval_token') || ''
        if (url) document.getElementById('inp-url').value = url
        if (tok) document.getElementById('inp-token').value = tok
      }
      loadSettings()

      function fmt(iso) {
        return new Date(iso).toLocaleTimeString(t('locale'), {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
        })
      }

      async function apiFetch(path, options = {}) {
        const headers = {
          'x-secret-token': token,
          'ngrok-skip-browser-warning': '1',
          ...(options.headers || {}),
        }
        const res = await fetch(serverUrl + path, { ...options, headers })
        if (!res.ok) throw new Error(`HTTP ${res.status}`)
        return res.json()
      }

      // 接続
      document.getElementById('btn-connect').addEventListener('click', async () => {
        const url = document.getElementById('inp-url').value.trim().replace(/\/$/, '')
        const tok = document.getElementById('inp-token').value.trim()
        const errEl = document.getElementById('setup-err')
        errEl.textContent = ''
        if (!url || !tok) {
          errEl.textContent = t('errBothRequired')
          return
        }
        serverUrl = url
        token = tok
        try {
          await apiFetch('/queue')
          saveSettings()
          document.getElementById('setup-view').style.display = 'none'
          document.getElementById('main-view').style.display = 'block'
          document.getElementById('queue-list').innerHTML = `<p class="empty">${t('emptyInitial')}</p>`
        } catch (e) {
          serverUrl = ''
          token = ''
          errEl.textContent = t('errConnect', e.message)
        }
      })

      // 切断
      document.getElementById('btn-disconnect').addEventListener('click', () => {
        serverUrl = ''
        token = ''
        selectedId = null
        document.getElementById('main-view').style.display = 'none'
        document.getElementById('setup-view').style.display = 'block'
      })

      // 取得ボタン
      document.getElementById('btn-fetch').addEventListener('click', async () => {
        const btn = document.getElementById('btn-fetch')
        btn.disabled = true
        btn.textContent = t('btnFetching')
        await fetchQueue()
        btn.disabled = false
        btn.textContent = t('btnFetch')
      })

      async function fetchQueue() {
        try {
          const data = await apiFetch('/queue')
          renderQueue(data)
          document.getElementById('main-err').textContent = ''
          document.getElementById('last-fetch').textContent = t('lastFetch', fmt(new Date().toISOString()))
        } catch (e) {
          document.getElementById('main-err').textContent = t('errNetwork', e.message)
        }
      }

      function btnClass(opt, allOptions) {
        const o = opt.toLowerCase()
        if (o === 'no' || o === 'rejected' || o === 'deny' || o === 'cancel') return 'btn-option btn-no'
        if (o === 'yes' || o === 'approved' || o === 'allow') return 'btn-option btn-yes'
        if (allOptions.indexOf(opt) === allOptions.length - 1) return 'btn-option btn-no'
        return 'btn-option btn-other'
      }

      function renderQueue(items) {
        const el = document.getElementById('queue-list')
        const badge = document.getElementById('cnt-badge')
        const bulkBtn = document.getElementById('btn-bulk-approve')

        if (items.length === 0) {
          el.innerHTML = `<p class="empty">${t('emptyQueue')}</p>`
          badge.style.display = 'none'
          bulkBtn.disabled = true
          bulkBtn.textContent = t('btnBulkApprove')
          selectedId = null
          return
        }

        badge.textContent = items.length
        badge.style.display = 'inline-block'
        bulkBtn.disabled = false
        bulkBtn.textContent = t('btnBulkApproveN', items.length)

        if (selectedId && !items.find((i) => i.id === selectedId)) selectedId = null

        el.innerHTML = ''
        items.forEach((item) => {
          const div = document.createElement('div')
          const isSelected = item.id === selectedId
          div.className = 'req-card' + (isSelected ? ' selected' : '')
          div.dataset.id = item.id

          const btnHtml = isSelected
            ? `<div class="btn-area">${item.options
                .map(
                  (opt) =>
                    `<button class="${btnClass(opt, item.options)}" data-id="${item.id}" data-answer="${opt}">${opt}</button>`
                )
                .join('')}</div>`
            : ''

          div.innerHTML = `
      <p class="req-time">${fmt(item.createdAt)}</p>
      <p class="req-desc${isSelected ? '' : ' req-desc-short'}">${escHtml(item.description)}</p>
      ${btnHtml}`

          el.appendChild(div)
        })
      }

      function escHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      }

      document.getElementById('queue-list').addEventListener('click', async (e) => {
        const btn = e.target.closest('button[data-id]')
        if (btn) {
          await resolveItem(btn.dataset.id, btn.dataset.answer, btn.closest('.btn-area'))
          return
        }
        const card = e.target.closest('.req-card')
        if (card) {
          selectedId = selectedId === card.dataset.id ? null : card.dataset.id
          await fetchQueue()
        }
      })

      document.getElementById('btn-bulk-approve').addEventListener('click', async () => {
        const btn = document.getElementById('btn-bulk-approve')
        btn.disabled = true
        btn.textContent = t('btnProcessing')
        try {
          const items = await apiFetch('/queue')
          for (const item of items) {
            await resolveItem(item.id, 'Yes', null, true)
          }
        } catch (e) {
          document.getElementById('main-err').textContent = t('errBulk', e.message)
        }
        await fetchQueue()
      })

      async function resolveItem(id, answer, btnArea, isBulk = false) {
        if (btnArea) btnArea.querySelectorAll('button').forEach((b) => (b.disabled = true))
        try {
          await apiFetch(`/resolve/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answer }),
          })
          history.unshift({
            description: getDescription(id),
            answer,
            resolvedAt: new Date().toISOString(),
          })
          if (history.length > 20) history.pop()
          renderHistory()
          if (!isBulk) {
            selectedId = null
            await fetchQueue()
          }
        } catch (e) {
          document.getElementById('main-err').textContent = t('errOp', e.message)
          if (btnArea) btnArea.querySelectorAll('button').forEach((b) => (b.disabled = false))
        }
      }

      function getDescription(id) {
        const card = document.querySelector(`.req-card[data-id="${id}"]`)
        return card ? card.querySelector('.req-desc').textContent : id
      }

      function renderHistory() {
        const sec = document.getElementById('hist-section')
        const el = document.getElementById('hist-list')
        if (history.length === 0) {
          sec.style.display = 'none'
          return
        }
        sec.style.display = 'block'
        el.innerHTML = ''
        history.forEach((item) => {
          const div = document.createElement('div')
          div.className = 'hist-card'
          const a = item.answer.toLowerCase()
          const isNo = a === 'no' || a === 'rejected' || a === 'deny' || a === 'cancel'
          const color = isNo ? '#cc2a22' : '#1a7f37'
          div.innerHTML = `
      <p class="hist-label" style="color:${color}">${escHtml(item.answer)} <span style="color:var(--text-secondary);font-weight:400;font-size:12px;">${fmt(item.resolvedAt)}</span></p>
      <p class="hist-desc">${escHtml(item.description)}</p>`
          el.appendChild(div)
        })
      }
    </script>
  </body>
</html>
